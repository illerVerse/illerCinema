<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>illerVerse Cinema</title>

  <style>
  :root {
    --bg: #0a0a0f;
    --text: #ffffff;
    --muted-text: #b3b3b3;
    --accent: #7f5cff;
    --blue: #00b7ff;
  }

  body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at top, #1a1035, #0a0a0f 60%);
    color: var(--text);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    opacity: 0;
    animation: pageFade 0.8s ease forwards;
  }

  @keyframes pageFade { to { opacity: 1; } }

  .page {
    width: 100%;
    max-width: 1200px;
    padding: 20px;
  }

  .title-block {
    text-align: center;
    margin-bottom: 20px;
  }

  .title-image {
    width: 420px;
    transform: rotate(-3deg);
    filter: drop-shadow(0 0 12px var(--accent));
    opacity: 0;
    animation: logoFade 0.8s ease forwards;
  }

  @keyframes logoFade { to { opacity: 1; } }

  .top-row {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  .site-subtitle {
    font-size: 1rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted-text);
    opacity: 0.9;
    margin: 0;
  }

  .search-container {
    flex: 1;
    display: flex;
    justify-content: center;
  }

  #searchInput {
    width: 100%;
    max-width: 360px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1.5px solid rgba(127, 92, 255, 0.35);
    background: #000f17;
    color: white;
    font-size: 1rem;
    box-shadow: 0 0 8px rgba(127, 92, 255, 0.18);
    outline: none;
    transition: 0.25s ease;
  }

  #searchInput:focus {
    border-color: #a78bff;
    box-shadow: 0 0 14px rgba(157, 122, 255, 0.45);
  }

  .discord-link {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: #5865f2;
    border-radius: 6px;
    color: white;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: bold;
    box-shadow: 0 0 12px rgba(88, 101, 242, 0.6);
    transition: 0.25s ease;
    white-space: nowrap;
  }

  .discord-link:hover {
    box-shadow: 0 0 22px rgba(127, 92, 255, 0.9);
    transform: translateY(-2px);
  }

  .discord-icon {
    width: 22px;
    height: 22px;
    background-color: white;
    mask: url("https://simpleicons.org/icons/discord.svg") no-repeat center;
    -webkit-mask: url("https://simpleicons.org/icons/discord.svg") no-repeat center;
    background-size: cover;
  }

  .poster-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
    gap: 30px 26px;
  }

  .poster-card {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    opacity: 0;
    animation: posterFade 0.6s ease forwards;
  }

  @keyframes posterFade { to { opacity: 1; } }

  .poster-number {
    position: absolute;
    top: 8px;
    left: 8px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.75);
    color: var(--blue);
    border: 1px solid var(--accent);
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    filter: drop-shadow(0 0 6px var(--accent));
    backdrop-filter: blur(4px);
  }

  .poster-image {
    width: 100%;
    border-radius: 10px;
    box-shadow:
      0 4px 14px rgba(0, 0, 0, 0.55),
      0 0 10px rgba(127, 92, 255, 0.25);
    transition: 0.25s ease;
  }

  .poster-card:hover .poster-image {
    box-shadow:
      0 0 18px rgba(127, 92, 255, 0.55),
      0 0 28px rgba(0, 183, 255, 0.45);
    transform: translateY(-2px);
  }

  .poster-info {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 16px 12px 20px;
    padding-left: 14px;
    background: linear-gradient(
      to top,
      rgba(0,0,0,0.85) 0%,
      rgba(0,0,0,0.55) 40%,
      rgba(0,0,0,0.0) 100%
    );
    opacity: 0;
    transform: translateY(25px);
    transition: opacity 0.35s ease, transform 0.35s ease;
    text-align: left;
    pointer-events: none;
  }

  .poster-card:hover .poster-info {
    opacity: 1;
    transform: translateY(0);
  }

  .info-title {
    margin: 0;
    font-size: 1rem;
    font-weight: 700;
    color: white;
    text-shadow: 0 0 6px rgba(127, 92, 255, 0.6);
    line-height: 1.1;
  }

  .info-details {
    margin-top: 6px;
    display: flex;
    justify-content: flex-start;
    align-items: center;
    gap: 10px;
    font-size: 0.78rem;
    line-height: 1;
    color: var(--muted-text);
  }

  .rating-box {
    padding: 2px 7px;
    border-radius: 5px;
    background: rgba(20, 12, 40, 0.75);
    border: 1px solid rgba(127, 92, 255, 0.7);
    box-shadow: 0 0 5px rgba(127, 92, 255, 0.45);
    font-size: 0.72rem;
    color: white;
  }

  .stars {
    color: var(--accent);
    text-shadow: 0 0 5px rgba(127, 92, 255, 0.7);
  }

  .footer {
    text-align: center;
    margin-top: 40px;
    color: var(--muted-text);
    font-size: 0.85rem;
    opacity: 0.6;
    text-shadow: 0 0 5px rgba(127, 92, 255, 0.4);
  }

  @media (max-width: 600px) {
    .page { padding: 14px; }
    .title-image { width: 300px; margin: 0 auto; display: block; }
    .top-row { flex-direction: column; align-items: center; text-align: center; gap: 12px; margin-bottom: 40px; }
    .search-container { width: 100%; display: flex; justify-content: center; }
    .poster-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; max-width: 340px; margin: 0 auto; }
    .poster-card { margin: 0 auto; }
    .poster-number { font-size: 0.72rem; padding: 3px 8px; }
  }

  .corner-frame {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
  }

  .corner-frame::before,
  .corner-frame::after {
    content: "";
    position: absolute;
    width: 70px;
    height: 70px;
    border: 2px solid var(--accent);
    filter: drop-shadow(0 0 8px var(--accent));
  }

  .corner-frame::before {
    top: 20px;
    left: 20px;
    border-right: none;
    border-bottom: none;
    border-radius: 8px 0 0 0;
  }

  .corner-frame::after {
    bottom: 20px;
    right: 20px;
    border-left: none;
    border-top: none;
    border-radius: 0 0 8px 0;
  }
  </style>
</head>

<body>

  <div class="corner-frame"></div>

  <div class="page">

    <div class="title-block">
      <img src="images/illerVerse.png" class="title-image" alt="illerVerse Logo">
    </div>

    <div class="top-row">
      <h2 class="site-subtitle">Catalog</h2>

      <div class="search-container">
        <input id="searchInput" placeholder="Search catalog..." autocomplete="off" />
      </div>

      <a class="discord-link" href="https://discord.gg/vpq26ScgUd" target="_blank">
        <span class="discord-icon"></span>
        <span>Discord</span>
      </a>
    </div>

    <main>
      <section class="poster-grid">

        <article class="poster-card" data-number="1">
          <div class="poster-number">#1</div>
          <img class="poster-image" src="images/poster-01.jpg" alt="Black Bird" />
          <div class="poster-info">
            <h3 class="info-title">Black Bird</h3>
            <div class="info-details">
              <span class="year">2022</span>
              <span class="rating-box">R</span>
              <span class="stars">★★★★★</span>
            </div>
          </div>
        </article>

      </section>

      <div class="footer">
        illerVerse • illerFlix • Neverdiepool
      </div>
    </main>

  </div>

  <script>
    document.getElementById("searchInput").addEventListener("input", function () {
      const query = this.value.toLowerCase();
      const cards = document.querySelectorAll(".poster-card");

      cards.forEach(card => {
        const title = card.querySelector(".info-title")?.textContent.toLowerCase() || "";
        const year = card.querySelector(".year")?.textContent.toLowerCase() || "";
        const number = card.dataset.number || "";

        const combined = `${title} ${year} ${number}`.toLowerCase();

        card.style.display = combined.includes(query) ? "block" : "none";
      });
    });
  </script>

</body>
</html>
