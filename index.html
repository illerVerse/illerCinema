<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>illerVerse Cinema</title>

  <style>
    :root {
      --bg-dark: #0a0a0a;
      --accent-red: #e50914;
      --muted-text: #999;
      --poster-hover-shadow: 0 0 18px rgba(229, 9, 20, 0.55);
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg-dark);
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 26px;
    }

    .site-title {
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent-red);
    }

    .site-subtitle {
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted-text);
      margin-top: 4px;
      text-align: center;
    }

    .discord-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      transition: 0.2s ease-out;
    }

    .discord-link:hover {
      background: rgba(255, 255, 255, 0.18);
      transform: translateY(-2px);
    }

    .discord-icon {
      width: 20px;
      height: 20px;
      background-image: url("images/discord-icon.png");
      background-size: cover;
      display: inline-block;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 22px;
    }

    .poster-card {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      background: #111;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.6);
      transition: 0.15s ease-out;
    }

    .poster-card:hover {
      box-shadow: var(--poster-hover-shadow);
      transform: translateY(-3px) scale(1.03);
      filter: saturate(1.1);
      z-index: 2;
    }

    .poster-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .poster-number {
      position: absolute;
      top: 6px;
      left: 6px;
      padding: 2px 7px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.85);
      color: var(--accent-red);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid rgba(229, 9, 20, 0.8);
      box-shadow: 0 0 6px rgba(0, 0, 0, 0.9);
    }

    .footer {
      margin-top: 26px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted-text);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .title-image {
      width: 100%;
      max-width: 420px;
      display: block;
      margin: 0 auto;
      transform: rotate(4deg);
    }

    .title-block {
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="header">
      <div class="title-block">
        <div class="site-title">
          <img src="images/illerVerse.png" alt="illerVerse Cinema" class="title-image">
        </div>
        <div class="site-subtitle">Movie Catalog</div>
      </div>

      <a
        class="discord-link"
        href="https://discord.gg/vpq26ScgUd"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="discord-icon" aria-hidden="true"></span>
        <span>Discord</span>
      </a>
    </header>

    <main>
      <section class="grid">

        <article class="poster-card" data-number="1">
          <div class="poster-number">#1</div>
          <img class="poster-image" src="images/poster-01.jpg" alt="Black Bird" />
        </article>

        <article class="poster-card" data-number="2">
          <div class="poster-number">#2</div>
          <img class="poster-image" src="images/poster-02.jpg" alt="Movie 2" />
        </article>

        <article class="poster-card" data-number="3">
          <div class="poster-number">#3</div>
          <img class="poster-image" src="images/poster-03.jpg" alt="Movie 3" />
        </article>

        <article class="poster-card" data-number="4">
          <div class="poster-number">#4</div>
          <img class="poster-image" src="images/poster-04.jpg" alt="Movie 4" />
        </article>

        <article class="poster-card" data-number="5">
          <div class="poster-number">#5</div>
          <img class="poster-image" src="images/poster-05.jpg" alt="Movie 5" />
        </article>

      </section>

      <div class="footer">
        illerVerse Catalog
      </div>
    </main>
  </div>
</body>
</html>
