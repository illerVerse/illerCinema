<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>illerVerse Cinema</title>

  <style>
  :root {
    --bg: #0a0a0f;
    --text: #ffffff;
    --muted-text: #b3b3b3;
    --accent: #7f5cff;
    --blue: #00b7ff;
  }

  /* ============================
     BASE PAGE LAYOUT
     ============================ */
  body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at top, #1a1035, #0a0a0f 60%);
    color: var(--text);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    opacity: 0;
    animation: pageFade 0.8s ease forwards;
  }

  @keyframes pageFade { to { opacity: 1; } }

  .page {
    width: 100%;
    max-width: 1200px;
    padding: 20px;
  }

  /* ============================
     TITLE / LOGO
     ============================ */
  .title-block {
    text-align: center;
    margin-bottom: 20px;
  }

  .title-image {
    width: 420px;
    transform: rotate(-3deg);
    filter: drop-shadow(0 0 12px var(--accent));
    transition: 0.3s ease;
    opacity: 0;
    animation: logoFade 0.8s ease forwards;
  }

  @keyframes logoFade { to { opacity: 1; } }

  /* ============================
     TOP ROW (Catalog + Search + Discord)
     ============================ */
  .top-row {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto 80px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  .site-subtitle {
    font-size: 0.9rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted-text);
    opacity: 0.85;
    margin: 0;
  }

  .search-container {
    flex: 1;
    display: flex;
    justify-content: center;
  }

  #searchInput {
    width: 100%;
    max-width: 400px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 2px solid rgba(127, 92, 255, 0.4);
    background: #0f0f17;
    color: white;
    font-size: 1rem;
    box-shadow: 0 0 12px rgba(127, 92, 255, 0.25);
    outline: none;
    transition: 0.25s ease;
  }

  #searchInput:focus {
    border-color: #a78bff;
    box-shadow: 0 0 18px rgba(157, 122, 255, 0.55);
  }

  /* ============================
     DISCORD BUTTON
     ============================ */
  .discord-link {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: #5865f2;
    border-radius: 6px;
    color: white;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: bold;
    box-shadow: 0 0 12px rgba(88, 101, 242, 0.6);
    transition: 0.25s ease;
    white-space: nowrap;
  }

  .discord-link:hover {
    box-shadow: 0 0 22px rgba(88, 101, 242, 0.9);
    transform: translateY(-2px);
  }

  .discord-icon {
    width: 22px;
    height: 22px;
    background-color: white;
    mask: url("https://simpleicons.org/icons/discord.svg") no-repeat center;
    -webkit-mask: url("https://simpleicons.org/icons/discord.svg") no-repeat center;
    background-size: cover;
  }

  /* ============================
     POSTER GRID
     ============================ */
  .poster-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 22px;
    margin-top: 10px;
  }

  /* ============================
     POSTER CARDS
     ============================ */
  .poster-card {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    background: #111;
    border: 2px solid rgba(127, 92, 255, 0.4);
    box-shadow: 0 0 12px rgba(127, 92, 255, 0.35);
    transition: 0.25s ease;
    opacity: 0;
    animation: posterFade 0.6s ease forwards;
  }

  @keyframes posterFade { to { opacity: 1; } }

  .poster-card:hover {
    transform: scale(1.06);
    box-shadow: 0 0 22px rgba(157, 122, 255, 0.55);
  }

  .poster-image {
    width: 100%;
    display: block;
  }

  /* ============================
     COSMIC DUAL‑TONE POSTER NUMBERS
     ============================ */
  .poster-number {
    position: absolute;
    top: 8px;
    left: 8px;
    padding: 4px 10px;
    border-radius: 999px;

    background: rgba(0, 0, 0, 0.75);
    color: var(--blue);
    border: 1px solid var(--accent);

    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;

    filter: drop-shadow(0 0 6px var(--accent));
    backdrop-filter: blur(4px);
  }

  /* ============================
     TMDB-STYLE HOVER INFO
     ============================ */
  .poster-info {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 12px;
    background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0));
    opacity: 0;
    transform: translateY(20px);
    transition: 0.35s ease;
    color: white;
  }

  .poster-card:hover .poster-info {
    opacity: 1;
    transform: translateY(0);
  }

  .info-title {
    margin: 0;
    font-size: 1rem;
    font-weight: bold;
  }

  .info-meta {
    margin: 4px 0 0;
    font-size: 0.8rem;
    color: #d0caff;
  }

  /* ============================
     MOBILE OPTIMIZATION
     ============================ */
  @media (max-width: 600px) {

    .page { padding: 14px; }

    .title-image {
      width: 300px;
      margin: 0 auto;
      display: block;
    }

    .top-row {
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 10px;
    }

    .site-subtitle {
      font-size: 0.8rem;
      letter-spacing: 0.18em;
    }

    .search-container {
      width: 100%;
      justify-content: center;
    }

    .discord-link {
      padding: 7px 12px;
      font-size: 0.85rem;
    }

    .poster-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      max-width: 320px;
      margin: 0 auto;
    }

    .poster-number {
      font-size: 0.7rem;
      padding: 3px 8px;
    }
  }

  /* ============================
     DESKTOP HOVER BEHAVIOR
     ============================ */
  @media (min-width: 601px) {
    .poster-info {
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
    }

    .poster-card:hover .poster-info {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* ============================
     FOOTER
     ============================ */
  .footer {
    text-align: center;
    margin-top: 40px;
    color: var(--muted-text);
    font-size: 0.85rem;
    opacity: 0.7;
    text-shadow: 0 0 8px var(--accent);
  }

  </style>
</head>

<body>
  <div class="page">

    <div class="title-block">
      <img src="images/illerVerse.png" alt="illerVerse Cinema" class="title-image">
    </div>

    <div class="top-row">
      <h2 class="site-subtitle">Catalog</h2>

      <div class="search-container">
        <input 
          type="text" 
          id="searchInput" 
          placeholder="Search catalog..."
          autocomplete="off"
        />
      </div>

      <a class="discord-link" href="https://discord.gg/vpq26ScgUd" target="_blank" rel="noopener noreferrer">
        <span class="discord-icon"></span>
        <span>Discord</span>
      </a>
    </div>

    <main>
      <section class="poster-grid">

        <article class="poster-card" data-number="1">
          <div class="poster-number">#1</div>
          <img class="poster-image" src="images/poster-01.jpg" alt="Black Bird" />
          <div class="poster-info">
            <h3 class="info-title">Black Bird</h3>
            <p class="info-meta">2022 • ★★★★★</p>
          </div>
        </article>

        <article class="poster-card" data-number="2">
          <div class="poster-number">#2</div>
          <img class="poster-image" src="images/poster-02.jpg" alt="Movie 2" />
        </article>

        <article class="poster-card" data-number="3">
          <div class="poster-number">#3</div>
          <img class="poster-image" src="images/poster-03.jpg" alt="Movie 3" />
        </article>

        <article class="poster-card" data-number="4">
          <div class="poster-number">#4</div>
          <img class="poster-image" src="images/poster-04.jpg" alt="Movie 4" />
        </article>

        <article class="poster-card" data-number="5">
          <div class="poster-number">#5</div>
          <img class="poster-image" src="images/poster-05.jpg" alt="Movie 5" />
        </article>

        <article class="poster-card" data-number="6">
          <div class="poster-number">#6</div>
          <img class="poster-image" src="images/poster-06.jpg" alt="Movie 6" />
        </article>

      </section>

      <div class="footer">
        illerVerse • illerFlix • Neverdiepool
      </div>
    </main>

  </div>

  <script>
    document.getElementById("searchInput").addEventListener("input", function () {
      const query = this.value.toLowerCase();
      const cards = document.querySelectorAll(".poster-card");

      cards.forEach(card => {
        const title = card.querySelector(".info-title")?.textContent.toLowerCase() || "";
        const meta = card.querySelector(".info-meta")?.textContent.toLowerCase() || "";
        const number = card.dataset.number || "";

        const combined = `${title} ${meta} ${number}`.toLowerCase();

        card.style.display = combined.includes(query) ? "block" : "none";
      });
    });
  </script>

</body>
</html>
