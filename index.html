<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>illerVerse Cinema</title>

  <style>
  :root {
    --bg: #0a0a0f;
    --text: #ffffff;
    --muted-text: #b3b3b3;
    --accent: #7f5cff;
    --blue: #00b7ff;

    --glow-1: rgba(127, 92, 255, 0.45);
    --glow-2: rgba(0, 183, 255, 0.35);
  }

  /* ============================
       GLOBAL LAYOUT
  ============================= */
  body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at top, #1a1035, #0a0a0f 60%);
    color: var(--text);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    opacity: 0;
    animation: pageFade 0.8s ease forwards;
    overflow-x: hidden;
  }

  @keyframes pageFade { to { opacity: 1; } }

  .page {
    width: 100%;
    max-width: 1200px;
    padding: 20px;
    position: relative;
    z-index: 2;
  }

  /* ============================
       COSMIC BACKGROUND FLARE
  ============================= */
  .cosmic-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background: radial-gradient(circle at 30% 20%, rgba(127,92,255,0.12), transparent 60%),
                radial-gradient(circle at 70% 80%, rgba(0,183,255,0.10), transparent 60%);
    animation: drift 18s ease-in-out infinite alternate;
  }

  @keyframes drift {
    0% { transform: translate(0px, 0px) scale(1); }
    100% { transform: translate(20px, -20px) scale(1.05); }
  }

  /* ============================
       VIGNETTE
  ============================= */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.55));
  }

  /* ============================
       TITLE + HEADER
============================= */
.title-block {
  position: relative;
  text-align: center;
  margin-bottom: 20px;
}

/* LOGO IMAGE */
.title-image {
  width: 420px;
  transform: rotate(-3deg);
  filter: drop-shadow(0 0 12px var(--accent));
  opacity: 0;
  animation: logoFade 0.8s ease forwards, logoPulse 8s ease-in-out infinite;
}

@keyframes logoFade { to { opacity: 1; } }

@keyframes logoPulse {
  0%, 100% { filter: drop-shadow(0 0 12px var(--accent)); }
  50% { filter: drop-shadow(0 0 22px var(--accent)); }
}



/* ============================
      TRON SCAN LINE
============================= */
.logo-scanline {
  position: absolute;
  top: 50%;
  left: 0;
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg,
    transparent,
    rgba(0,183,255,1),
    rgba(127,92,255,1),
    rgba(0,183,255,1),
    transparent
  );
  filter: blur(1.5px);
  opacity: 0.9;
  animation: scanMove 2.8s ease-in-out infinite;
  z-index: -1;
}

@keyframes scanMove {
  0% { transform: translateX(-120%) scaleX(0.8); opacity: 0; }
  20% { opacity: 1; }
  50% { transform: translateX(20%) scaleX(1.1); opacity: 1; }
  80% { opacity: 1; }
  100% { transform: translateX(120%) scaleX(0.8); opacity: 0; }
}



/* ============================
      COSMIC HALO BEHIND LOGO
============================= */
.title-block::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 520px;
  height: 520px;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle,
    rgba(127,92,255,0.35),
    rgba(0,183,255,0.15),
    transparent 70%
  );
  filter: blur(40px);
  z-index: -2;
}



/* ============================
      FLOATING PARTICLES (SOFT)
============================= */
.logo-particles-soft {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: -1;
}

.logo-particle-soft {
  position: absolute;
  width: 6px;
  height: 6px;
  background: rgba(255,255,255,0.25);
  border-radius: 50%;
  filter: blur(3px);
  animation: floatSoft 7s linear infinite;
}

@keyframes floatSoft {
  0% { transform: translateY(0) scale(1); opacity: 0.8; }
  100% { transform: translateY(-140px) scale(0.4); opacity: 0; }
}



/* ============================
      FLOATING PARTICLES (NEON)
============================= */
.logo-particles-neon {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: -1;
}

.logo-particle-neon {
  position: absolute;
  width: 5px;
  height: 5px;
  background: rgba(0,183,255,0.9);
  border-radius: 50%;
  filter: blur(2px);
  animation: floatNeon 5s linear infinite;
}

@keyframes floatNeon {
  0% { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-160px) scale(0.4); opacity: 0; }
}

@keyframes scanMove {
  0% {
    transform: translateX(-120%) scaleX(0.8);
    opacity: 0;
  }
  20% {
    opacity: 1;
  }
  50% {
    transform: translateX(20%) scaleX(1.1);
    opacity: 1;
  }
  80% {
    opacity: 1;
  }
  100% {
    transform: translateX(120%) scaleX(0.8);
    opacity: 0;
  }
}

  .top-row {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  .site-subtitle {
    font-size: 1rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted-text);
    opacity: 0.9;
    margin: 0;
    position: relative;
  }

  .site-subtitle::after {
    content: "";
    display: block;
    width: 60px;
    height: 2px;
    margin-top: 6px;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    border-radius: 2px;
  }

  /* ============================
       SEARCH BAR
============================= */
.search-container {
  flex: 1;
  display: flex;
  justify-content: center;
  position: relative; /* anchor for glow */
}

#searchInput {
  width: 100%;
  max-width: 360px;
  padding: 10px 14px;
  border-radius: 8px;
  border: 1.5px solid rgba(127, 92, 255, 0.35);
  background: #000f17;
  color: white;
  font-size: 1rem;
  box-shadow: 0 0 8px rgba(127, 92, 255, 0.18);
  outline: none;
  transition: 0.25s ease;
}

#searchInput:focus {
  border-color: #a78bff;
  box-shadow: 0 0 14px rgba(157, 122, 255, 0.45);
}

/* ============================
      SEARCH BAR GLOW LINE
============================= */
.search-container::after {
  content: "";
  position: absolute;
  bottom: -16px;          /* distance BELOW the search bar */
  left: 50%;
  transform: translateX(-50%);
  width: 360px;           /* match input max-width */
  max-width: 100%;        /* stay within container on small screens */
  height: 3px;
  background: var(--accent);
  box-shadow:
    0 0 10px var(--accent),
    0 0 20px var(--accent),
    0 0 30px var(--accent);
  border-radius: 4px;
  opacity: 0.9;
  pointer-events: none;
}

/* ============================
      SEARCH BAR GLOW LINE
============================= */
#searchInput::after {
  content: "";
  position: absolute;
  bottom: -16px; /* distance BELOW the search bar */
  left: 0;
  width: 100%; /* EXACT width of the input */
  height: 3px;
  background: var(--accent);
  box-shadow:
    0 0 10px var(--accent),
    0 0 20px var(--accent),
    0 0 30px var(--accent);
  border-radius: 4px;
  opacity: 0.9;
  pointer-events: none;
}

  /* ============================
       DISCORD BUTTON
  ============================= */
  .discord-link {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: #5865f2;
    border-radius: 6px;
    color: white;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: bold;
    box-shadow: 0 0 12px rgba(88, 101, 242, 0.6);
    transition: 0.25s ease;
    white-space: nowrap;
  }

  .discord-link:hover {
    box-shadow: 0 0 22px rgba(127, 92, 255, 0.9);
    transform: translateY(-2px);
  }

  .discord-icon {
    width: 22px;
    height: 22px;
    background-color: white;
    mask: url("https://simpleicons.org/icons/discord.svg") no-repeat center;
    -webkit-mask: url("https://simpleicons.org/icons/discord.svg") no-repeat center;
    background-size: cover;
  }

  /* ============================
       POSTER GRID + PANEL GLOW
  ============================= */
  .poster-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
    gap: 30px 26px;
    padding: 20px;
    border-radius: 16px;
    background: rgba(255,255,255,0.02);
    box-shadow:
      0 0 25px rgba(127,92,255,0.15),
      0 0 45px rgba(0,183,255,0.12);
    backdrop-filter: blur(6px);
  }

  /* ============================
       POSTER CARD
  ============================= */
  .poster-card {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    opacity: 0;
    animation: posterFade 0.6s ease forwards;
    transform: translateY(4px);
    transition: transform 0.25s ease;
  }

  @keyframes posterFade { to { opacity: 1; } }

  .poster-card:hover {
    transform: translateY(-4px);
  }

  .poster-number {
    position: absolute;
    top: 8px;
    left: 8px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.75);
    color: var(--blue);
    border: 1px solid var(--accent);
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    filter: drop-shadow(0 0 6px var(--accent));
    backdrop-filter: blur(4px);
  }

  .poster-image {
    width: 100%;
    border-radius: 10px;
    box-shadow:
      0 4px 14px rgba(0, 0, 0, 0.55),
      0 0 10px rgba(127, 92, 255, 0.25);
    transition: 0.25s ease;
  }

  .poster-card:hover .poster-image {
    box-shadow:
      0 0 18px var(--glow-1),
      0 0 28px var(--glow-2);
    transform: translateY(-2px);
  }

  /* ============================
       HOVER OVERLAY
  ============================= */
  .poster-info {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 16px 12px 20px;
    padding-left: 14px;
    background: linear-gradient(
      to top,
      rgba(0,0,0,0.85) 0%,
      rgba(0,0,0,0.55) 40%,
      rgba(0,0,0,0.0) 100%
    );
    opacity: 0;
    transform: translateY(25px);
    transition: opacity 0.35s ease, transform 0.35s ease;
    text-align: left;
    pointer-events: none;
  }

  .poster-card:hover .poster-info {
    opacity: 1;
    transform: translateY(0);
  }

  .info-title {
    margin: 0;
    font-size: 1rem;
    font-weight: 700;
    color: white;
    text-shadow: 0 0 6px rgba(127, 92, 255, 0.6);
    line-height: 1.1;
  }

  .info-details {
    margin-top: 6px;
    display: flex;
    justify-content: flex-start;
    align-items: center;
    gap: 10px;
    font-size: 0.78rem;
    line-height: 1;
    color: var(--muted-text);
  }

  .rating-box {
    padding: 2px 7px;
    border-radius: 5px;
    background: rgba(20, 12, 40, 0.75);
    border: 1px solid rgba(127, 92, 255, 0.7);
    box-shadow: 0 0 5px rgba(127, 92, 255, 0.45);
    font-size: 0.72rem;
    color: white;
  }

  .stars {
    color: var(--accent);
    text-shadow: 0 0 5px rgba(127, 92, 255, 0.7);
  }

  /* ============================
       FOOTER
  ============================= */
  .footer {
    text-align: center;
    margin-top: 40px;
    color: var(--muted-text);
    font-size: 0.85rem;
    opacity: 0.6;
    text-shadow: 0 0 5px rgba(127, 92, 255, 0.4);
  }

  /* ============================
       MOBILE RESPONSIVE
  ============================= */
  @media (max-width: 600px) {
    .page { padding: 14px; }
    .title-image { width: 300px; margin: 0 auto; display: block; }
    .top-row { flex-direction: column; align-items: center; text-align: center; gap: 12px; margin-bottom: 40px; }
    .search-container { width: 100%; display: flex; justify-content: center; }
    .poster-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; max-width: 340px; margin: 0 auto; }
    .poster-card { margin: 0 auto; }
    .poster-number { font-size: 0.72rem; padding: 3px 8px; }
  }

  /* ============================
      MOBILE TRUE CENTERING
============================= */
@media (max-width: 600px) {

  /* Center the page column within the neon frame */
  .page {
    max-width: 420px;
    margin: 0 auto;
  }

  /* Logo block */
  .title-block {
    margin-bottom: 6px;
    transform: scale(0.85);
    text-align: center;
  }

  /* Top row: subtitle, search, Discord */
  .top-row {
    width: 100%;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 10px;
  }

  /* Search container centered */
  .search-container {
    width: 100%;
    display: flex;
    justify-content: center;
    position: relative;
  }

  /* Search input width */
  #searchInput {
    max-width: 300px;
    width: 100%;
  }

  /* Glow bar centered relative to the input */
  .search-container::after {
    content: "";
    position: absolute;
    width: 300px;
    max-width: 100%;
    height: 2px;
    background: radial-gradient(circle, var(--accent), transparent);
    left: 50%;
    transform: translateX(-50%);
    bottom: -12px;
  }

  /* Discord button centered (HTML uses .discord-link) */
  .discord-link {
    width: 200px;
    text-align: center;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  /* Posters centered */
  .poster-grid {
    justify-content: center;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }

  .poster-card {
    margin: 0 auto;
  }
  </style>
</head>

<body>

  <!-- COSMIC BACKGROUND -->
  <div class="cosmic-bg"></div>
  <div class="vignette"></div>

  <!-- CORNER FRAMES -->
  <div class="corner-frame">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>

  <!-- PAGE WRAPPER (CENTERED) -->
  <div class="page">

    <!-- LOGO BLOCK -->
    <div class="title-block">

      <!-- TRON SCAN LINE -->
      <div class="logo-scanline"></div>

      <!-- COSMIC SOFT PARTICLES -->
      <div class="logo-particles-soft">
        <div class="logo-particle-soft" style="left: 20%; animation-delay: 0s;"></div>
        <div class="logo-particle-soft" style="left: 40%; animation-delay: 1s;"></div>
        <div class="logo-particle-soft" style="left: 60%; animation-delay: 2s;"></div>
        <div class="logo-particle-soft" style="left: 80%; animation-delay: 3s;"></div>
      </div>

      <!-- NEON PARTICLES -->
      <div class="logo-particles-neon">
        <div class="logo-particle-neon" style="left: 25%; animation-delay: 0s;"></div>
        <div class="logo-particle-neon" style="left: 50%; animation-delay: 1.2s;"></div>
        <div class="logo-particle-neon" style="left: 75%; animation-delay: 2.4s;"></div>
      </div>

      <!-- LOGO IMAGE -->
      <img src="images/illerVerse.png" class="title-image" alt="illerVerse Logo">

    </div>

    <!-- TOP ROW -->
    <div class="top-row">
      <h2 class="site-subtitle">Catalog</h2>

      <div class="search-container">
        <input id="searchInput" placeholder="Search catalog..." autocomplete="off" />
      </div>

      <a class="discord-link" href="https://discord.gg/vpq26ScgUd" target="_blank">
        <span class="discord-icon"></span>
        <span>Discord</span>
      </a>
    </div>

    <!-- MAIN CONTENT -->
    <main>
      <section class="poster-grid">

        <article class="poster-card" data-number="1">
          <div class="poster-number">#1</div>
          <img class="poster-image" src="images/poster-01.jpg" alt="Black Bird" />
          <div class="poster-info">
            <h3 class="info-title">Black Bird</h3>
            <div class="info-details">
              <span class="year">2022</span>
              <span class="rating-box">R</span>
              <span class="stars">★★★★★</span>
            </div>
          </div>
        </article>

      </section>

      <div class="footer">
        illerVerse • illerFlix • Neverdiepool
      </div>
    </main>

  </div>

  <!-- SEARCH SCRIPT -->
  <script>
    document.getElementById("searchInput").addEventListener("input", function () {
      const query = this.value.toLowerCase();
      const cards = document.querySelectorAll(".poster-card");

      cards.forEach(card => {
        const title = card.querySelector(".info-title")?.textContent.toLowerCase() || "";
        const year = card.querySelector(".year")?.textContent.toLowerCase() || "";
        const number = card.dataset.number || "";

        const combined = `${title} ${year} ${number}`.toLowerCase();

        card.style.display = combined.includes(query) ? "block" : "none";
      });
    });
  </script>

</body>
</html>
