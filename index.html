<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>illerVerse Cinema</title>

  <style>
    :root {
      --bg-dark: #000000;
      --bg-gradient: linear-gradient(180deg, #0a0a0a 0%, #000000 100%);
      --accent-red: #e50914;
      --muted-text: #b3b3b3;

      --poster-radius: 10px;
      --poster-shadow: 0 0 12px rgba(0, 0, 0, 0.8);
      --poster-hover-shadow:
        0 0 22px rgba(229, 9, 20, 0.55),
        0 0 12px rgba(229, 9, 20, 0.35);
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg-gradient);
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 30px;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .title-block {
      text-align: center;
    }

    .title-image {
      width: 100%;
      max-width: 460px;
      display: block;
      margin: 0 auto;
      transform: rotate(3deg);
      filter: drop-shadow(0 0 12px rgba(229, 9, 20, 0.4));
    }

    .site-subtitle {
      font-size: 0.9rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted-text);
      margin-top: 6px;
    }

    /* Discord button */
    .discord-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 18px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      color: white;
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      transition: 0.2s ease-out;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .discord-link:hover {
      background: rgba(255, 255, 255, 0.18);
      transform: translateY(-2px);
    }

    .discord-icon {
      width: 22px;
      height: 22px;
      background-image: url("images/discord-icon.png");
      background-size: cover;
      display: inline-block;
    }

    /* Poster Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 28px;
    }

    .poster-card {
      position: relative;
      overflow: hidden;
      border-radius: var(--poster-radius);
      background: #111;
      box-shadow: var(--poster-shadow);
      transition: 0.18s ease-out;
    }

    .poster-card:hover {
      transform: translateY(-4px) scale(1.04);
      box-shadow: var(--poster-hover-shadow);
      filter: saturate(1.15);
      z-index: 3;
    }

    .poster-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Number badge */
    .poster-number {
      position: absolute;
      top: 8px;
      left: 8px;
      padding: 3px 9px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.85);
      color: var(--accent-red);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: 1px solid rgba(229, 9, 20, 0.8);
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.9);
    }

    /* Footer */
    .footer {
      margin-top: 40px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted-text);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.75;
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="header">
      <div class="title-block">
        <img src="images/illerVerse.png" alt="illerVerse Cinema" class="title-image">
        <div class="site-subtitle">Movie Catalog</div>
      </div>

      <a
        class="discord-link"
        href="https://discord.gg/vpq26ScgUd"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="discord-icon" aria-hidden="true"></span>
        <span>Discord</span>
      </a>
    </header>

    <main>
      <section class="grid">

        <article class="poster-card" data-number="1">
          <div class="poster-number">#1</div>
          <img class="poster-image" src="images/poster-01.jpg" alt="Black Bird" />
        </article>

        <article class="poster-card" data-number="2">
          <div class="poster-number">#2</div>
          <img class="poster-image" src="images/poster-02.jpg" alt="Movie 2" />
        </article>

        <article class="poster-card" data-number="3">
          <div class="poster-number">#3</div>
          <img class="poster-image" src="images/poster-03.jpg" alt="Movie 3" />
        </article>

        <article class="poster-card" data-number="4">
          <div class="poster-number">#4</div>
          <img class="poster-image" src="images/poster-04.jpg" alt="Movie 4" />
        </article>

        <article class="poster-card" data-number="5">
          <div class="poster-number">#5</div>
          <img class="poster-image" src="images/poster-05.jpg" alt="Movie 5" />
        </article>

      </section>

      <div class="footer">
        illerVerse Catalog
      </div>
    </main>
  </div>
</body>
</html>
